<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AutoVote 信息流改版 · 设计参考</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background:#f3f4f6; }
  .clamp2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .clamp3{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
  .no-scrollbar::-webkit-scrollbar{display:none}
  .no-scrollbar{-ms-overflow-style:none;scrollbar-width:none}
  .phone{width:402px}
</style>
</head>
<body class="text-gray-900">

<div class="max-w-[1280px] mx-auto px-6 py-8">
  <h1 class="text-2xl font-bold">AutoVote 信息流改版 · 设计参考</h1>
  <p class="text-sm text-gray-500 mt-1">媒体置顶图文卡 · 无图回退 Polymarket 图 / 纯文字 · PC 双栏（积分榜 + 热门盘口）。下方为静态 mockup，占位图来自 picsum。</p>

  <!-- ============================ PC ============================ -->
  <div class="mt-8 mb-3 flex items-center gap-2">
    <span class="text-xs font-semibold tracking-wide text-gray-400">PC 端 · ≥1024px</span>
    <span class="h-px flex-1 bg-gray-200"></span>
  </div>

  <div class="rounded-3xl bg-gray-50 ring-1 ring-black/5 overflow-hidden">
    <!-- app header -->
    <div class="h-14 bg-white/90 backdrop-blur border-b border-black/5 flex items-center px-6 gap-3">
      <span class="font-extrabold text-lg">AutoVote</span>
      <span class="text-xs text-gray-400">新闻预测信息流</span>
      <div class="ml-auto flex items-center gap-3">
        <span class="text-[13px] text-gray-500">🌐</span>
        <span class="rounded-full ring-1 ring-black/10 pl-1 pr-3 py-1 flex items-center gap-2">
          <span class="w-6 h-6 rounded-full bg-gradient-to-br from-pink-400 to-rose-500 text-white text-[11px] font-bold grid place-items-center">V</span>
          <span class="text-[13px] font-semibold text-amber-600 tabular-nums">1,000分</span>
        </span>
      </div>
    </div>

    <!-- two-pane -->
    <div class="flex gap-6 px-6 py-6 justify-center">
      <!-- ===== feed column ===== -->
      <div class="w-full max-w-[600px]">
        <!-- featured rail -->
        <div class="flex items-center justify-between mb-2">
          <span class="text-sm font-semibold text-gray-700">🔥 精选</span>
          <span class="text-xs text-gray-400">横向滑动</span>
        </div>
        <div class="flex gap-3 overflow-x-auto no-scrollbar pb-1 mb-5">
          <!-- featured card -->
          <a class="shrink-0 w-[210px] rounded-2xl overflow-hidden ring-1 ring-black/5 bg-white shadow-sm">
            <div class="h-24 bg-cover bg-center" style="background-image:url('https://picsum.photos/seed/feat1/420/240')"></div>
            <div class="p-3">
              <div class="text-[12px] font-semibold leading-snug clamp2">特朗普会在 7 月前签署对等关税协议吗</div>
              <div class="mt-2 flex items-center gap-1 text-[11px]"><span class="px-1.5 py-0.5 rounded bg-green-50 text-green-700 font-medium">Yes 64%</span><span class="text-gray-400">·$2.1M</span></div>
            </div>
          </a>
          <a class="shrink-0 w-[210px] rounded-2xl overflow-hidden ring-1 ring-black/5 bg-white shadow-sm">
            <div class="h-24 bg-gradient-to-br from-amber-500 to-orange-600 grid place-items-center"><span class="text-white/90 text-xs font-bold tracking-wider">加密 · CRYPTO</span></div>
            <div class="p-3">
              <div class="text-[12px] font-semibold leading-snug clamp2">比特币年底前突破 12 万美元？</div>
              <div class="mt-2 flex items-center gap-1 text-[11px]"><span class="px-1.5 py-0.5 rounded bg-red-50 text-red-700 font-medium">Yes 41%</span><span class="text-gray-400">·$5.8M</span></div>
            </div>
          </a>
          <a class="shrink-0 w-[210px] rounded-2xl overflow-hidden ring-1 ring-black/5 bg-white shadow-sm">
            <div class="h-24 bg-cover bg-center" style="background-image:url('https://picsum.photos/seed/feat3/420/240')"></div>
            <div class="p-3">
              <div class="text-[12px] font-semibold leading-snug clamp2">世界杯决赛谁会捧杯</div>
              <div class="mt-2 flex items-center gap-1 text-[11px]"><span class="px-1.5 py-0.5 rounded bg-violet-50 text-violet-700 font-medium">阿根廷 28%</span></div>
            </div>
          </a>
        </div>

        <!-- tabs -->
        <div class="flex gap-1.5 mb-4">
          <span class="px-3.5 py-1.5 rounded-full text-[13px] font-medium bg-gray-900 text-white">推荐</span>
          <span class="px-3.5 py-1.5 rounded-full text-[13px] font-medium bg-white text-gray-500 ring-1 ring-black/8">政治</span>
          <span class="px-3.5 py-1.5 rounded-full text-[13px] font-medium bg-white text-gray-500 ring-1 ring-black/8">加密</span>
          <span class="px-3.5 py-1.5 rounded-full text-[13px] font-medium bg-white text-gray-500 ring-1 ring-black/8">体育</span>
          <span class="px-3.5 py-1.5 rounded-full text-[13px] font-medium bg-white text-gray-500 ring-1 ring-black/8">科技</span>
        </div>

        <!-- cards -->
        <div class="space-y-3" id="pc-cards"></div>
      </div>

      <!-- ===== right rail ===== -->
      <div class="w-[300px] shrink-0 hidden lg:block">
        <div class="sticky top-4 space-y-4" id="rail"></div>
      </div>
    </div>
  </div>

  <!-- ============================ MOBILE ============================ -->
  <div class="mt-12 mb-3 flex items-center gap-2">
    <span class="text-xs font-semibold tracking-wide text-gray-400">手机端 · 媒体置顶</span>
    <span class="h-px flex-1 bg-gray-200"></span>
  </div>

  <div class="flex justify-center">
    <div class="phone rounded-[2.2rem] bg-black p-2.5 shadow-2xl">
      <div class="rounded-[1.8rem] overflow-hidden bg-gray-50 h-[820px] overflow-y-auto no-scrollbar">
        <div class="h-12 bg-white/90 backdrop-blur border-b border-black/5 flex items-center px-4 gap-2 sticky top-0 z-10">
          <span class="font-extrabold">AutoVote</span>
          <span class="ml-auto rounded-full ring-1 ring-black/10 pl-1 pr-2.5 py-0.5 flex items-center gap-1.5">
            <span class="w-5 h-5 rounded-full bg-gradient-to-br from-pink-400 to-rose-500 text-white text-[10px] font-bold grid place-items-center">V</span>
            <span class="text-[12px] font-semibold text-amber-600 tabular-nums">1,000</span>
          </span>
        </div>
        <div class="p-3 space-y-3" id="m-cards"></div>
      </div>
    </div>
  </div>

</div>

<script>
const CAT = {
  政治:{grad:'from-blue-500 to-indigo-600', chip:'bg-blue-50 text-blue-600 ring-blue-200', en:'POLITICS'},
  财经:{grad:'from-emerald-500 to-teal-600', chip:'bg-emerald-50 text-emerald-600 ring-emerald-200', en:'ECONOMY'},
  加密:{grad:'from-amber-500 to-orange-600', chip:'bg-amber-50 text-amber-600 ring-amber-200', en:'CRYPTO'},
  体育:{grad:'from-violet-500 to-purple-600', chip:'bg-violet-50 text-violet-600 ring-violet-200', en:'SPORTS'},
  科技:{grad:'from-cyan-500 to-sky-600', chip:'bg-cyan-50 text-cyan-600 ring-cyan-200', en:'TECH'},
  热点:{grad:'from-orange-500 to-rose-600', chip:'bg-orange-50 text-orange-600 ring-orange-200', en:'HOT'},
};

// media: {type:'image'|'video'|'market'|'none', src?}
// 回退链：GNews 图(image) → Polymarket 图(market) → 纯文字(none)
const CARDS = [
  {
    cat:'政治', source:'Reuters', handle:'@reuters', ago:'12分钟前', generated:false,
    media:{type:'image', src:'https://picsum.photos/seed/news1/800/450'},
    headline:'美国与伊朗就核设施监督达成临时框架，下月进入细节谈判',
    summary:'两国代表在日内瓦完成第三轮磋商，外交人士称已就监督机制达成"原则性共识"，但制裁解除时间表仍是最大分歧。',
    market:{title:'美伊 7 月底前签署永久和平协议？', yes:38, no:62}, likes:'2.4k', comments:'186'
  },
  {
    cat:'财经', source:'Polymarket', handle:'@polymarket', ago:'1小时前', generated:false,
    media:{type:'market', src:'https://picsum.photos/seed/pmlogo/300/300'},
    headline:'美联储官员暗示年内或再降息一次，市场闻声反弹',
    summary:'多位 FOMC 成员近期讲话偏鸽。本条无配套新闻图，回退使用 Polymarket 盘口图（多为方形 logo，做磨砂底居中处理）。',
    market:{title:'美联储 7 月降息？', yes:56, no:44}, likes:'1.3k', comments:'95'
  },
  {
    cat:'加密', source:'CoinDesk', handle:'@coindesk', ago:'2小时前', generated:true,
    media:{type:'none'},
    headline:'比特币 24 小时上涨 4.2%，重新站上关键阻力位',
    summary:'AI 生成盘口、且无任何配图时回退为纯文字卡：靠标题分类色 + 留白维持质感，不放占位图。',
    market:{title:'比特币年底前突破 12 万美元？', yes:41, no:59}, likes:'980', comments:'72'
  },
  {
    cat:'体育', source:'ESPN', handle:'@espn', ago:'3小时前', generated:false,
    media:{type:'video', src:'https://picsum.photos/seed/news3/800/450', channel:'FOX Soccer'},
    headline:'世界杯半决赛前瞻：阿根廷与法国时隔两年再相遇',
    summary:'梅西领衔的阿根廷与卫冕冠军法国狭路相逢，博彩市场对决赛归属出现明显分歧。',
    market:{title:'世界杯决赛谁会捧杯', multi:[['阿根廷',28],['法国',24],['巴西',19]]}, likes:'5.1k', comments:'430'
  },
];

function chip(cat){const c=CAT[cat];return `<span class="px-2 py-0.5 rounded-full ring-1 text-[11px] font-medium ${c.chip}">${cat}</span>`;}
function aiChip(){return `<span class="px-2 py-0.5 rounded-full ring-1 text-[11px] font-medium bg-indigo-50 text-indigo-600 ring-indigo-200">🤖 AI 盘口</span>`;}

function media(m, cat){
  if(m.type==='image') return `<div class="aspect-video bg-cover bg-center" style="background-image:url('${m.src}')"></div>`;
  if(m.type==='video') return `
    <div class="relative aspect-video bg-cover bg-center" style="background-image:url('${m.src}')">
      <div class="absolute inset-0 bg-black/25"></div>
      <div class="absolute inset-0 grid place-items-center">
        <div class="w-14 h-14 rounded-full bg-black/55 grid place-items-center">
          <div class="w-0 h-0 border-y-[10px] border-y-transparent border-l-[16px] border-l-white ml-1"></div>
        </div>
      </div>
      <div class="absolute bottom-2 left-2 text-[11px] text-white/90 bg-black/40 px-2 py-0.5 rounded">▶ ${m.channel}</div>
    </div>`;
  if(m.type==='market') return `
    <div class="relative aspect-video overflow-hidden bg-gray-100">
      <div class="absolute inset-0 bg-cover bg-center blur-xl scale-110 opacity-40" style="background-image:url('${m.src}')"></div>
      <img src="${m.src}" class="relative h-full w-full object-contain p-6" alt="" />
    </div>`;
  // none → 纯文字卡（不放任何媒体块）
  return '';
}

function marketWidget(mk){
  let body;
  if(mk.multi){
    body = `<div class="space-y-1.5 mt-2">` + mk.multi.map(([label,p])=>`
      <div class="w-full flex items-center gap-2 text-[13px] rounded-lg px-2 py-1.5 ring-1 ring-transparent hover:bg-white hover:ring-black/10 cursor-pointer">
        <span class="flex-1 truncate text-left text-gray-700">${label}</span>
        <div class="w-16 h-1.5 rounded-full bg-black/10 overflow-hidden"><div class="h-full bg-indigo-400" style="width:${p}%"></div></div>
        <span class="tabular-nums w-9 text-right font-medium">${p}%</span>
      </div>`).join('') + `</div>`;
  } else {
    body = `<div class="grid grid-cols-2 gap-2 mt-2">
      <button class="flex items-center justify-between rounded-lg px-2.5 py-1.5 text-[13px] font-medium ring-1 bg-green-50 text-green-700 ring-green-200 hover:bg-green-100"><span>会发生</span><span class="tabular-nums">${mk.yes}%</span></button>
      <button class="flex items-center justify-between rounded-lg px-2.5 py-1.5 text-[13px] font-medium ring-1 bg-red-50 text-red-700 ring-red-200 hover:bg-red-100"><span>不会</span><span class="tabular-nums">${mk.no}%</span></button>
    </div>`;
  }
  return `
    <div class="mx-4 sm:mx-5 mt-3 rounded-xl border border-black/8 bg-gray-50/70 px-3 py-2.5">
      <div class="flex items-center justify-between">
        <span class="text-[11px] font-medium text-gray-500 truncate">📊 相关盘口 · ${mk.title}</span>
        <span class="text-[10px] text-gray-400 shrink-0 ml-2">100分</span>
      </div>
      ${body}
      <div class="mt-2 flex items-center justify-between">
        <span class="text-[12px] text-gray-400">点选项一键下注</span>
        <span class="text-[12px] font-medium text-indigo-600">完整盘口 →</span>
      </div>
    </div>`;
}

function card(d){
  return `
  <article class="rounded-2xl border border-black/8 bg-white shadow-sm overflow-hidden hover:shadow-md transition">
    ${media(d.media, d.cat)}
    <div class="px-4 sm:px-5 pt-3.5">
      <div class="flex items-center gap-2 mb-2.5">
        <div class="w-7 h-7 rounded-full bg-gradient-to-br from-gray-200 to-gray-300 grid place-items-center text-[11px] font-bold text-gray-600 shrink-0">${d.source[0]}</div>
        <span class="text-[13px] font-semibold text-gray-800">${d.source}</span>
        <span class="text-[12px] text-gray-400 truncate">${d.handle}</span>
        <span class="ml-auto text-[11px] text-gray-400 shrink-0">${d.ago}</span>
      </div>
      <div class="mb-2 flex items-center gap-1.5">${chip(d.cat)}${d.generated?aiChip():''}</div>
      <h2 class="font-semibold leading-snug text-[15px] text-gray-900">${d.headline}</h2>
      <p class="mt-1 text-[13px] leading-relaxed text-gray-500 clamp3">${d.summary}</p>
    </div>
    ${marketWidget(d.market)}
    <div class="flex items-center gap-5 px-4 sm:px-5 py-3 mt-1 text-gray-400 text-[13px]">
      <span class="flex items-center gap-1.5">♥ ${d.likes}</span>
      <span class="flex items-center gap-1.5">💬 ${d.comments}</span>
      <span class="ml-auto">↗ 分享</span>
    </div>
  </article>`;
}

// 右栏：积分榜 + 热门盘口
const LEADERS = [['Mia',18420],['Kenji',15960],['Sofia',13210],['Leo',11870],['Aria',9540]];
const HOT = [
  ['美伊永久和平协议？','政治',38,'$2.1M'],
  ['比特币破 12 万？','加密',41,'$5.8M'],
  ['美联储 7 月降息？','财经',56,'$3.4M'],
  ['世界杯阿根廷夺冠？','体育',28,'$1.2M'],
];
function rail(){
  const medal=['🥇','🥈','🥉','4','5'];
  return `
  <div class="rounded-2xl border border-black/8 bg-white shadow-sm p-4">
    <div class="text-sm font-semibold text-gray-700 mb-3">🏆 积分榜</div>
    <div class="space-y-2.5">
      ${LEADERS.map((l,i)=>`
        <div class="flex items-center gap-2.5">
          <span class="w-5 text-center text-[13px] ${i<3?'':'text-gray-400'}">${medal[i]}</span>
          <span class="w-6 h-6 rounded-full bg-gradient-to-br from-indigo-300 to-purple-400 text-white text-[11px] font-bold grid place-items-center">${l[0][0]}</span>
          <span class="text-[13px] text-gray-700 flex-1">${l[0]}</span>
          <span class="text-[13px] font-semibold tabular-nums text-amber-600">${l[1].toLocaleString()}</span>
        </div>`).join('')}
    </div>
  </div>
  <div class="rounded-2xl border border-black/8 bg-white shadow-sm p-4">
    <div class="text-sm font-semibold text-gray-700 mb-3">🔥 热门盘口</div>
    <div class="space-y-3">
      ${HOT.map(([t,cat,yes,vol])=>`
        <a class="block group">
          <div class="text-[13px] text-gray-800 leading-snug group-hover:text-indigo-600">${t}</div>
          <div class="mt-1 flex items-center gap-2 text-[11px]">
            ${chip(cat)}
            <span class="px-1.5 py-0.5 rounded ${yes>=50?'bg-green-50 text-green-700':'bg-red-50 text-red-700'} font-medium tabular-nums">Yes ${yes}%</span>
            <span class="text-gray-400 ml-auto">${vol}</span>
          </div>
        </a>`).join('')}
    </div>
  </div>
  <div class="rounded-2xl bg-gradient-to-br from-indigo-500 to-purple-600 text-white p-4 shadow-sm">
    <div class="text-[13px] font-semibold">还没下注？</div>
    <div class="text-[12px] text-white/80 mt-1">用 1000 虚拟积分，点一下就能对新闻表态。</div>
  </div>`;
}

document.getElementById('pc-cards').innerHTML = CARDS.map(card).join('');
document.getElementById('m-cards').innerHTML  = CARDS.map(card).join('');
document.getElementById('rail').innerHTML     = rail();
</script>
</body>
</html>
